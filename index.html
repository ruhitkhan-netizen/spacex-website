<!DOCTYPE html>
<html>

<head>
<title>Let's Waste Time Together</title>

<style>

body{
margin:0;
padding:40px;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
color:white;
}

.main-heading{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:50px;

background:linear-gradient(to right,#60a5fa,#93c5fd,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

letter-spacing:2px;
text-shadow:0 0 20px rgba(255,255,255,0.3);
}

.section{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
margin-bottom:40px;
backdrop-filter:blur(10px);
box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

h2{
margin-bottom:20px;
font-size:32px;
color:#bfdbfe;
}

input,select,button{
padding:14px;
margin:10px 5px;
border:none;
border-radius:10px;
font-size:16px;
}

input,select{
background:#e2e8f0;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.result{
margin-top:20px;
font-size:24px;
font-weight:bold;
color:#facc15;
}

</style>
</head>

<body>

<div class="main-heading">
Let's Waste Time Together
</div>

<!-- Currency Converter -->

<div class="section">

<h2>Currency Converter</h2>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<select id="fromCurrency">
<option value="USD">USD</option>
<option value="BDT">BDT</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="AUD">AUD</option>
</select>

<select id="toCurrency">
<option value="BDT">BDT</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="AUD">AUD</option>
</select>

<button onclick="convertCurrency()">
Convert Currency
</button>

<div class="result" id="currencyResult"></div>

</div>

<!-- IELTS Calculator -->

<div class="section">

<h2>IELTS Band Score Calculator</h2>

<input type="number" id="listening" placeholder="Listening Score" step="0.5">

<input type="number" id="reading" placeholder="Reading Score" step="0.5">

<input type="number" id="writing" placeholder="Writing Score" step="0.5">

<input type="number" id="speaking" placeholder="Speaking Score" step="0.5">

<button onclick="calculateBand()">
Calculate Overall Band
</button>

<div class="result" id="ieltsResult"></div>

</div>

<script>

function convertCurrency(){

let amount =
parseFloat(document.getElementById("amount").value);

let from =
document.getElementById("fromCurrency").value;

let to =
document.getElementById("toCurrency").value;

let rates = {
USD:1,
BDT:117,
EUR:0.92,
GBP:0.79,
AUD:1.52
};

let usdAmount = amount / rates[from];

let converted = usdAmount * rates[to];

document.getElementById("currencyResult").innerHTML =
amount + " " + from + " = " +
converted.toFixed(2) + " " + to;

}
