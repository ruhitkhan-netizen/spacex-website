<!DOCTYPE html>
<html>

<head>
  <title>Come Waste Time Together</title>

  <style>

    body{
      margin:0;
      padding:30px;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    .main-heading{
      text-align:center;
      font-size:55px;
      font-weight:bold;
      margin-bottom:50px;

      background:linear-gradient(to right,#38bdf8,#818cf8,#f472b6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      letter-spacing:2px;
      text-shadow:0 0 20px rgba(255,255,255,0.2);
    }

    .section{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);

      padding:25px;
      margin-bottom:40px;

      border-radius:20px;

      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#38bdf8;
    }

    input, select{
      width:100%;
      height:50px;
      margin-bottom:15px;

      border:none;
      border-radius:12px;

      padding-left:10px;
      font-size:18px;
    }

    button{
      width:100%;
      height:50px;

      border:none;
      border-radius:12px;

      background:#38bdf8;
      color:white;

      font-size:18px;
      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      background:#0ea5e9;
    }

    .result{
      text-align:center;
      margin-top:20px;
      font-size:24px;
      font-weight:bold;
    }

    #display{
      text-align:right;
      font-size:24px;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    .buttons button{
      height:60px;
    }

  </style>
</head>

<body>

<div class="main-heading">
  Come Waste Time Together
</div>

<!-- Calculator -->

<div class="section">

<h2>Scientific Calculator</h2>

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">−</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="append('+')">+</button>

<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.sqrt(')">√</button>

<button onclick="clearDisplay()">C</button>

</div>

</div>

<!-- Birthday -->

<div class="section">

<h2>What Day Were You Born?</h2>

<input type="date" id="birthdate">

<button onclick="findDay()">Find My Birth Day</button>

<div class="result" id="dayResult"></div>

</div>

<!-- Currency Converter -->

<div class="section">

<h2>Currency Converter</h2>

<input type="number" id="usdAmount" placeholder="Enter USD Amount">

<button onclick="convertCurrency()">
Convert USD to BDT
</button>

<div class="result" id="currencyResult"></div>

</div>

<!-- IELTS -->

<div class="section">

<h2>IELTS Band Score Calculator</h2>

<input type="number" step="0.5" id="listening" placeholder="Listening">
<input type="number" step="0.5" id="reading" placeholder="Reading">
<input type="number" step="0.5" id="writing" placeholder="Writing">
<input type="number" step="0.5" id="speaking" placeholder="Speaking">

<button onclick="calculateIELTS()">
Calculate Overall Band
</button>

<div class="result" id="ieltsResult"></div>

</div>

<script>

function append(value){
  document.getElementById("display").value += value;
}

function clearDisplay(){
  document.getElementById("display").value = "";
}

function calculate(){

  try{
    document.getElementById("display").value =
    eval(document.getElementById("display").value);
  }

  catch{
    alert("Invalid Expression");
  }
}

function findDay(){

  let birthdate =
  document.getElementById("birthdate").value;

  let date = new Date(birthdate);

  let days = [
    "Sunday",
    "Monday",
    "Tuesday",
    "Wednesday",
    "Thursday",
    "Friday",
    "Saturday"
  ];

  let dayName = days[date.getDay()];

  document.getElementById("dayResult").innerHTML =
  "You were born on " + dayName;

}

function convertCurrency(){

  let usd =
  document.getElementById("usdAmount").value;

  let rate = 121;

  let result = usd * rate;

  document.getElementById("currencyResult").innerHTML =
  "$" + usd + " = ৳" + result;

}

function calculateIELTS(){

  let l =
  parseFloat(document.getElementById("listening").value);

  let r =
  parseFloat(document.getElementById("reading").value);

  let w =
  parseFloat(document.getElementById("writing").value);

  let s =
  parseFloat(document.getElementById("speaking").value);

  let overall =
  (l+r+w+s)/4;

  overall =
  Math.round(overall * 2) / 2;

  document.getElementById("ieltsResult").innerHTML =
  "Overall Band Score: " + overall;

}

</script>

</body>
</html>
