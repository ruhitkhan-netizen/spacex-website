<!DOCTYPE html>
<html>

<head>

<title>Come Waste Time Together</title>

<style>

body{
  margin:0;
  padding:40px;

  font-family:Arial;

  background:linear-gradient(
  135deg,
  #020617,
  #0f172a,
  #1e3a8a
  );

  color:white;
}

.main-heading{

  text-align:center;

  font-size:60px;

  font-weight:bold;

  margin-bottom:60px;

  background:linear-gradient(
  to right,
  #60a5fa,
  #38bdf8,
  #818cf8
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  letter-spacing:3px;

  text-shadow:0 0 25px rgba(96,165,250,0.4);
}

.section{

  max-width:700px;

  margin:auto;
  margin-bottom:40px;

  padding:30px;

  border-radius:25px;

  background:rgba(255,255,255,0.06);

  backdrop-filter:blur(15px);

  box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{

  text-align:center;

  margin-bottom:25px;

  color:#93c5fd;

  font-size:32px;
}

input{

  width:100%;

  height:55px;

  margin-bottom:20px;

  border:none;

  border-radius:15px;

  padding-left:15px;

  font-size:18px;

  background:#0f172a;

  color:white;
}

button{

  width:100%;

  height:55px;

  border:none;

  border-radius:15px;

  background:linear-gradient(
  to right,
  #2563eb,
  #38bdf8
  );

  color:white;

  font-size:20px;

  cursor:pointer;

  transition:0.3s;
}

button:hover{

  transform:scale(1.02);

  opacity:0.9;
}

.result{

  text-align:center;

  margin-top:25px;

  font-size:28px;

  font-weight:bold;

  color:#7dd3fc;
}

</style>

</head>

<body>

<div class="main-heading">
Come Waste Time Together
</div>

<!-- Currency Converter -->

<div class="section">

<h2>Currency Converter</h2>

<input
type="number"
id="usdAmount"
placeholder="Enter USD Amount">

<button onclick="convertCurrency()">
Convert USD to BDT
</button>

<div
class="result"
id="currencyResult">
</div>

</div>

<!-- IELTS -->

<div class="section">

<h2>IELTS Band Score Calculator</h2>

<input
type="number"

id="listening"
placeholder="Listening Score">

<input
type="number"
step="0.5"
id="reading"
placeholder="Reading Score">

<input
type="number"
step="0.5"
id="writing"
placeholder="Writing Score">

<input
type="number"
step="0.5"
id="speaking"
placeholder="Speaking Score">

<button onclick="calculateIELTS()">
Calculate Overall Band
</button>

<div
class="result"
id="ieltsResult">
</div>

</div>
