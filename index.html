<!DOCTYPE html>
<html>
<head>
  <title>SpaceX Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
    }

    header {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to bottom, #000, #111);
    }

    h1 {
      font-size: 90px;
      letter-spacing: 8px;
      margin: 0;
      color: white;
    }

    .x {
      color: #777;
    }

    p {
      font-size: 22px;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      border: 2px solid white;
      color: white;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    section {
      padding: 60px;
      text-align: center;
      background: #050505;
    }

    section h2 {
      font-size: 36px;
      color: white;
    }

    footer {
      padding: 20px;
      text-align: center;
      background: black;
      color: #aaa;
    }
  </style>
</head>

<body>

  <header>
    <div>
      <h1>SPACE<span class="x">X</span></h1>
      <p>Exploring the Future of Space Technology</p>
      <a class="btn" href="#about">Explore More</a>
    </div>
  </header>

  <section id="about">
    <h2>About SpaceX</h2>
    <p>
      SpaceX is a space technology company known for reusable rockets,
      spacecraft, satellite launches, and space exploration missions.
    </p>
  </section>

  <section>
    <h2>My Links</h2>
    <p><a class="btn" href="https://youtu.be/mNPSEoqxhOk?si=vfNt_f9B7YFdfEZ7">Recent Launch</a></p>
    <p><a class="btn" href="https://youtube.com/shorts/Gi3ZcH7g_9c?si=IxZqGqxCAFlNTkfH">Starship Updates</a></p>
    <p><a class="btn" href="login · GitHub Topics https://share.google/DPP7JwaLJcqVZA4Hd">GitHub</a></p>
  </section>

  <footer>
    <p>© 2026 SpaceX Inspired Website</p>
  </footer>

</body>
</html>
