<!-- Currency Converter -->

<div class="section">

<h2>Currency Converter</h2>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<select id="fromCurrency">

<option value="USD">USD 🇺🇸</option>
<option value="BDT">BDT 🇧🇩</option>
<option value="EUR">EUR 🇪🇺</option>
<option value="GBP">GBP 🇬🇧</option>
<option value="AUD">AUD 🇦🇺</option>

</select>

<select id="toCurrency">

<option value="BDT">BDT 🇧🇩</option>
<option value="USD">USD 🇺🇸</option>
<option value="EUR">EUR 🇪🇺</option>
<option value="GBP">GBP 🇬🇧</option>
<option value="AUD">AUD 🇦🇺</option>

</select>

<button onclick="convertCurrency()">
Convert Currency
</button>

<div
class="result"
id="currencyResult">
</div>

</div>

<!-- IELTS -->

<div class="section">

<h2>IELTS Band Score Calculator</h2>

<input
type="number"
step="0.5"
id="listening"
placeholder="Listening Score">

<input
type="number"
step="0.5"
id="reading"
placeholder="Reading Score">

<input
type="number"
step="0.5"
id="writing"
placeholder="Writing Score">

<input
type="number"
step="0.5"
id="speaking"
placeholder="Speaking Score">

<button onclick="calculateIELTS()">
Calculate Overall Band
</button>

<div
class="result"
id="ieltsResult">
</div>

</div>

<script>

function convertCurrency(){

let amount =
parseFloat(
document.getElementById(
"amount"
).value);

let from =
document.getElementById(
"fromCurrency"
).value;

let to =
document.getElementById(
"toCurrency"
).value;

let rates = {

USD:1,
BDT:121,
EUR:0.92,
GBP:0.79,
AUD:1.53

};

let usdAmount =
amount / rates[from];

let converted =
usdAmount * rates[to];

converted =
converted.toFixed(2);

document.getElementById(
"currencyResult"
).innerHTML =

amount + " " + from +
" = " +
converted + " " + to;

}

function calculateIELTS(){

let l =
parseFloat(
document.getElementById(
"listening"
).value);

let r =
parseFloat(
document.getElementById(
"reading"
).value);

let w =
parseFloat(
document.getElementById(
"writing"
).value);

let s =
parseFloat(
document.getElementById(
"speaking"
).value);

let overall =
(l+r+w+s)/4;

overall =
Math.round(overall * 2) / 2;

document.getElementById(
"ieltsResult"
).innerHTML =

"Overall Band Score: "
+ overall;

}

</script>
